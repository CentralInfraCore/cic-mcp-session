---
title: System Architecture Overview — cic-mcp-session
description: >
  Provides a high-level overview of the cic-mcp-session component's architecture and
  its role within the cic-mcp-* family.

concepts:
  - name: The "Session layer" concept
    summary: >
      This component stores and serves a single conversation/session scope over MCP —
      not canonical knowledge, not cross-session memory.
    component_map:
      - id: cic-mcp-knowledge
        role: reviewed/canonical knowledge, versioned
      - id: cic-mcp-workdir
        role: "current repo/worktree/branch/diff (role filled by cic-factory)"
      - id: cic-mcp-session
        role: "session-scope event, timeline, chunk, retrieval, provenance — THIS REPO"
      - id: cic-mcp-shared
        role: cross-session memory, weighting, conflict
      - id: cic-mcp-gateway
        role: trust-domain aware context compiler
      - id: cic-mcp-factory
        role: the family's capability production/maintenance factory

  - name: Boundaries
    summary: What belongs to the session layer's responsibility, and what does not.
    yes:
      - SessionIngressEnvelope ingest
      - raw event store
      - turn/timeline projection
      - chunk store
      - source/provenance refs
      - metadata index, full-text search, vector search
      - session-scope context pack
      - stable SQL/API/MCP read tools
    no:
      - canonical knowledge
      - shared memory
      - cross-session graph
      - final decision mining
      - promotion without human review

  - name: Trust model
    summary: The session layer's trust marking.
    trust:
      canonical: false
      promotion_allowed: false
      interpreted: false   # at ingress/raw level
      default_scope: session_id
      cross_session: false

  - name: Planned data flow (Postgres-first, not yet implemented)
    summary: >
      SessionIngressEnvelope -> session_raw -> session_core -> session_idx -> session_api ->
      MCP read tools. The trigger layer must never call an LLM or HTTP.
    diagram: |
      graph TD
          A[SessionIngressEnvelope] --> B[session_raw - raw event store]
          B --> C[session_core - turn/timeline projection, chunk store]
          C --> D[session_idx - FTS, vector, metadata index]
          D --> E[session_api - stable SQL functions]
          E --> F[MCP read tools - context pack]

  - name: Current state
    summary: >
      The repo was bootstrapped from the base-repo mcp/main MCP server scaffold
      (2026-06-20); no session-specific content is implemented yet.
    next_capability_jobs:
      - session-ingress-envelope-contract-001
      - session-postgres-storage-design-001
