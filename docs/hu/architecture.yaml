---
title: Rendszer Architektúra Áttekintés — cic-mcp-session
description: >
  A cic-mcp-session komponens magas szintű architektúráját és a cic-mcp-* családban
  betöltött szerepét mutatja be.

concepts:
  - name: A "Session réteg" koncepció
    summary: >
      Ez a komponens egyetlen beszélgetés/session scope-ját tárolja és szolgálja ki
      MCP-n keresztül — nem canonical tudás, nem cross-session memória.
    component_map:
      - id: cic-mcp-knowledge
        role: reviewed/canonical tudás, verziózott
      - id: cic-mcp-workdir
        role: "aktuális repo/worktree/branch/diff (= cic-factory szerepe)"
      - id: cic-mcp-session
        role: "session-scope event, timeline, chunk, retrieval, provenance — EZ A REPO"
      - id: cic-mcp-shared
        role: cross-session memória, súlyozás, konfliktus
      - id: cic-mcp-gateway
        role: trust-domain aware context compiler
      - id: cic-mcp-factory
        role: a család capability gyártó/karbantartó factory-ja

  - name: Fő határok
    summary: Mi tartozik a session réteg felelősségébe, és mi nem.
    yes:
      - SessionIngressEnvelope ingest
      - raw event store
      - turn/timeline projection
      - chunk store
      - source/provenance refs
      - metadata index, full-text search, vector search
      - session-scope context pack
      - stabil SQL/API/MCP read tools
    no:
      - canonical tudás
      - shared memory
      - cross-session graph
      - végleges döntésbányászat
      - human review nélküli promotion

  - name: Trust modell
    summary: A session réteg trust-jelölése.
    trust:
      canonical: false
      promotion_allowed: false
      interpreted: false   # ingress/raw szinten
      default_scope: session_id
      cross_session: false

  - name: Tervezett adatfolyam (Postgres-first, még nem implementált)
    summary: >
      SessionIngressEnvelope -> session_raw -> session_core -> session_idx -> session_api ->
      MCP read tools. A trigger réteg nem hívhat LLM-et vagy HTTP-t.
    diagram: |
      graph TD
          A[SessionIngressEnvelope] --> B[session_raw - raw event store]
          B --> C[session_core - turn/timeline projection, chunk store]
          C --> D[session_idx - FTS, vector, metadata index]
          D --> E[session_api - stabil SQL fuggvenyek]
          E --> F[MCP read tools - context pack]

  - name: Jelenlegi állapot
    summary: >
      A repo a base-repo mcp/main MCP-szerver scaffold-jából lett bootstrapelve
      (2026-06-20), session-specifikus tartalom még nincs implementálva.
    next_capability_jobs:
      - session-ingress-envelope-contract-001
      - session-postgres-storage-design-001
